<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYDRAS GAMING | Dashboard</title>
    <link rel="stylesheet" href="/dashboard.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#050505] text-white overflow-x-hidden">
    <!-- Navbar -->
    <nav class="fixed w-full z-50 glass-header border-b border-cyan-500/30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <a href="/index.html" class="flex-shrink-0 flex items-center gap-3">
                    <i data-lucide="gamepad-2" class="text-cyan-400 w-8 h-8 neon-text"></i>
                    <span class="font-orbitron font-bold text-2xl tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-blue-600 neon-text">HYDRAS</span>
                </a>
                <div class="flex items-center space-x-4">
                    <button onclick="logout()" class="font-orbitron px-4 py-2 border border-red-500/50 text-red-500 rounded hover:bg-red-500/10 transition-all text-sm font-bold tracking-wider">LOGOUT</button>
                    <button id="mobile-menu-btn" class="md:hidden text-gray-300">
                        <i data-lucide="menu" class="w-8 h-8"></i>
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="pt-20 flex min-h-screen">
        <!-- Sidebar -->
        <aside class="hidden md:block w-64 border-r border-gray-800 bg-black/50 backdrop-blur-sm fixed h-full shrink-0">
            <div class="p-6">
                <div class="flex items-center gap-4 mb-10">
                    <div class="w-12 h-12 rounded-full bg-cyan-900 border border-cyan-500 flex items-center justify-center text-cyan-400 shadow-[0_0_10px_cyan] overflow-hidden" id="side-avatar-container">
                        <i data-lucide="user" class="w-6 h-6" id="side-user-icon"></i>
                    </div>
                    <div>
                        <h3 class="font-orbitron font-bold text-lg" id="side-username">Player</h3>
                        <p class="font-rajdhani text-xs text-cyan-400" id="side-rank">Level 1</p>
                    </div>
                </div>
                <nav class="space-y-2 font-orbitron text-sm tracking-wider">
                    <a href="#" class="dashboard-nav-item active flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white transition-colors rounded-r-lg">
                        <i data-lucide="layout-dashboard" class="w-5 h-5"></i> OVERVIEW
                    </a>
                    <a href="#" class="dashboard-nav-item flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white transition-colors rounded-r-lg">
                        <i data-lucide="gamepad-2" class="w-5 h-5"></i> MY GAMES
                    </a>
                    <a href="#" class="dashboard-nav-item flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white transition-colors rounded-r-lg">
                        <i data-lucide="trophy" class="w-5 h-5"></i> TOURNAMENTS
                    </a>
                    <a href="#" class="dashboard-nav-item flex items-center gap-3 px-4 py-3 text-gray-400 hover:text-white transition-colors rounded-r-lg">
                        <i data-lucide="settings" class="w-5 h-5"></i> SETTINGS
                    </a>
                </nav>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 md:ml-64 p-4 md:p-8">
            <div class="max-w-5xl mx-auto">
                <header class="mb-8">
                    <h1 class="font-orbitron text-3xl font-bold text-white uppercase" id="welcome-text">WELCOME BACK, PLAYER</h1>
                    <p class="font-rajdhani text-gray-400">Manage your games, tournaments and profile stats.</p>
                </header>

                <!-- Profile Stats Card -->
                <div class="profile-card rounded-xl p-6 border border-gray-800 mb-8 flex flex-col md:flex-row items-center gap-8 relative overflow-hidden">
                    <div class="absolute -right-20 -top-20 w-64 h-64 bg-cyan-500/5 blur-[100px] rounded-full"></div>
                    
                    <div class="w-24 h-24 rounded-full bg-black border-2 border-cyan-500 p-1 relative z-10 shrink-0 group cursor-pointer" id="avatar-upload-btn" title="Upload Photo">
                        <img src="https://ui-avatars.com/api/?name=User&background=0D8ABC&color=fff" id="profile-avatar" class="w-full h-full rounded-full object-cover">
                        <div class="absolute inset-1 rounded-full bg-black/60 flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity">
                            <i data-lucide="camera" class="w-6 h-6 text-cyan-400"></i>
                        </div>
                        <input type="file" id="avatar-upload" accept="image/*" class="hidden">
                    </div>
                    
                    <div class="flex-1 w-full z-10">
                        <div class="flex justify-between items-end mb-2">
                            <div>
                                <h2 class="font-orbitron text-2xl font-bold text-white uppercase" id="card-username">USERNAME</h2>
                                <p class="font-rajdhani text-cyan-400 tracking-widest uppercase text-sm" id="card-rank">ROOKIE RANK</p>
                            </div>
                            <div class="text-right">
                                <span class="font-orbitron text-xs text-gray-400 block mb-1">TOTAL XP</span>
                                <span class="font-rajdhani text-xl font-bold text-white" id="card-xp">0</span>
                            </div>
                        </div>
                        <div class="xp-bar-container">
                            <div class="xp-bar w-[45%]" id="xp-bar-fill"></div>
                        </div>
                        <p class="font-rajdhani text-xs text-gray-500 mt-2 text-right">450 XP to next rank</p>
                    </div>
                </div>

                <!-- Games Library -->
                <div>
                    <div class="flex justify-between items-center mb-6">
                        <h2 class="font-orbitron text-2xl font-bold text-white border-l-4 border-cyan-500 pl-3">GAME LIBRARY</h2>
                        <a href="/index.html#games" class="text-cyan-400 font-rajdhani text-sm hover:underline">BROWSE ALL</a>
                    </div>
                    
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="dashboard-games">
                        <!-- Populated via JS -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Mobile Menu Overlay -->
    <div id="mobile-sidebar" class="fixed inset-0 z-[60] bg-black/90 backdrop-blur block md:hidden transition-transform transform translate-x-full">
        <div class="p-6 pt-24">
            <nav class="space-y-4 font-orbitron text-xl">
                <a href="#" class="block text-cyan-400">OVERVIEW</a>
                <a href="#" class="block text-gray-400">MY GAMES</a>
                <a href="#" class="block text-gray-400">TOURNAMENTS</a>
                <a href="#" class="block text-gray-400">SETTINGS</a>
            </nav>
            <button onclick="logout()" class="mt-8 font-orbitron px-8 py-3 bg-red-500/20 text-red-500 border border-red-500 w-full rounded">LOGOUT</button>
        </div>
    </div>

    <script src="/dashboard.js" type="module"></script>
</body>
</html>
