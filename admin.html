<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HYDRAS GAMING | SUPER ADMIN PANEL</title>
    <link rel="stylesheet" href="/admin.css">
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;500;700;900&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-[#050505] text-white overflow-hidden h-screen flex">
    
    <!-- Sidebar -->
    <aside class="w-64 admin-sidebar h-full flex flex-col shrink-0 z-20 shadow-[5px_0_15px_rgba(0,0,0,0.5)]">
        <div class="h-20 flex items-center px-6 border-b border-gray-800">
            <i data-lucide="shield-alert" class="text-cyan-400 w-6 h-6 mr-3"></i>
            <span class="font-orbitron font-bold text-xl tracking-wider text-white">SUPER ADMIN</span>
        </div>
        
        <div class="flex-1 overflow-y-auto py-6">
            <nav class="space-y-1 font-orbitron text-sm">
                <a href="#" class="admin-nav-item active flex items-center gap-3 px-6 py-3 text-gray-400 hover:text-white transition-colors" data-view="dashboard">
                    <i data-lucide="layout-dashboard" class="w-5 h-5"></i> OVERVIEW
                </a>
                <a href="#" class="admin-nav-item flex items-center gap-3 px-6 py-3 text-gray-400 hover:text-white transition-colors" data-view="users">
                    <i data-lucide="users" class="w-5 h-5"></i> USER MGT
                </a>
                <a href="#" class="admin-nav-item flex items-center gap-3 px-6 py-3 text-gray-400 hover:text-white transition-colors" data-view="games">
                    <i data-lucide="gamepad-2" class="w-5 h-5"></i> GAMES MGT
                </a>
                <a href="#" class="admin-nav-item flex items-center gap-3 px-6 py-3 text-gray-400 hover:text-white transition-colors" data-view="news">
                    <i data-lucide="newspaper" class="w-5 h-5"></i> NEWS MGT
                </a>
                <a href="#" class="admin-nav-item flex items-center gap-3 px-6 py-3 text-gray-400 hover:text-white transition-colors" data-view="banners">
                    <i data-lucide="image" class="w-5 h-5"></i> BANNERS
                </a>
            </nav>
        </div>
        
        <div class="p-6 border-t border-gray-800">
            <button onclick="logout()" class="w-full flex items-center justify-center gap-2 font-orbitron px-4 py-2 border border-red-500/50 text-red-500 rounded hover:bg-red-500/10 transition-all text-sm font-bold tracking-wider">
                <i data-lucide="log-out" class="w-4 h-4"></i> EXIT ADMIN
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 h-full flex flex-col overflow-hidden bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-cyan-900/10 via-black to-[#020202]">
        
        <!-- Header -->
        <header class="h-20 border-b border-gray-800 flex items-center justify-between px-8 bg-black/50 backdrop-blur-sm shrink-0">
            <h2 class="font-orbitron text-2xl font-bold uppercase" id="page-title">SYSTEM OVERVIEW</h2>
            <div class="flex items-center gap-4">
                <div class="px-3 py-1 bg-green-500/10 border border-green-500/30 text-green-500 rounded text-xs font-rajdhani font-bold flex items-center gap-2">
                    <div class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div> SYSTEM ONLINE
                </div>
                <div class="w-10 h-10 rounded-full bg-cyan-900 border border-cyan-500 flex items-center justify-center text-cyan-400">
                    <i data-lucide="user-cog" class="w-5 h-5"></i>
                </div>
            </div>
        </header>

        <!-- View Container -->
        <div class="flex-1 overflow-y-auto p-8" id="view-container">
            <!-- Dynamic Content Injected Here -->
        </div>

    </main>

    <!-- Generic Modal for Forms -->
    <div id="admin-modal" class="fixed inset-0 z-[100] flex items-center justify-center hidden opacity-0 transition-opacity duration-300">
        <div class="absolute inset-0 modal-glass" id="modal-overlay"></div>
        <div class="relative w-full max-w-2xl bg-[#0a0a0a] border border-cyan-500/50 rounded-lg shadow-[0_0_30px_rgba(0,255,255,0.1)] overflow-hidden scale-95 transition-transform duration-300" id="modal-content">
            <div class="bg-gray-900 p-5 border-b border-gray-800 flex justify-between items-center">
                <h3 class="font-orbitron font-bold text-lg text-white" id="modal-title">FORM</h3>
                <button id="close-modal-btn" class="text-gray-400 hover:text-white"><i data-lucide="x"></i></button>
            </div>
            <div class="p-6 max-h-[70vh] overflow-y-auto" id="modal-body">
                <!-- Form injected via JS -->
            </div>
        </div>
    </div>

    <script src="/admin.js" type="module"></script>
</body>
</html>
